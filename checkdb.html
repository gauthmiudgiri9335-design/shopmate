<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>DB Check</title>
<style>
body{font-family:monospace;padding:20px;background:#f4f5fb;}
.rec{background:white;border-radius:8px;padding:12px;margin-bottom:12px;border:1px solid #ddd;}
h3{color:#1e2a5e;margin-bottom:8px;font-size:14px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1e2a5e;color:white;padding:5px;}
td{padding:5px;border-bottom:1px solid #eee;}
.bad{color:red;font-weight:bold;}
.ok{color:green;font-weight:bold;}
button{background:#1e2a5e;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin:4px;}
</style>
</head>
<body>
<h2>🔍 Database Field Inspector</h2>
<button onclick="loadRecords()">Load All Records</button>
<div id="out"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const sc = window.supabaseClient || window.db;

async function loadRecords() {
  const {data:recs} = await sc.from("records").select("*").order("created_at",{ascending:false});
  const out = document.getElementById("out");
  out.innerHTML = "";

  recs.forEach(function(rec) {
    const d = rec.data;
    if (!d || d.isHoliday) return;

    let rows = "";
    (d.products||[]).forEach(function(p,i) {
      const shillakOk = p.shillak !== "" && p.shillak !== null && p.shillak !== undefined;
      const vikriOk   = p.vikri   !== "" && p.vikri   !== null && p.vikri   !== undefined;
      rows += `<tr>
        <td>${p.name||"⚠️ EMPTY"}</td>
        <td>${p.dilela||""}</td>
        <td>${p.ekun||""}</td>
        <td class="${shillakOk?"ok":"bad"}">${shillakOk ? p.shillak : "⚠️ EMPTY/NULL"}</td>
        <td class="${vikriOk?"ok":"bad"}">${vikriOk ? p.vikri : "⚠️ EMPTY/NULL"}</td>
        <td>${p.rakkam||""}</td>
      </tr>`;
    });

    const div = document.createElement("div");
    div.className = "rec";
    div.innerHTML = `<h3>📄 ${d.day1||""} ${d.date1} ${d.date2?"ते "+d.date2:""}</h3>
      <table>
        <tr><th>Name</th><th>Dilela</th><th>Ekun</th><th>Shillak</th><th>Vikri</th><th>Rakkam</th></tr>
        ${rows}
      </table>`;
    out.appendChild(div);
  });
}
</script>
</body>
</html>
